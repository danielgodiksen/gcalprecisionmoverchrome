<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GCal Precision Mover — Follow-up</title>
  <style>
    body { font: 14px/1.55 Roboto, Arial, sans-serif; color: #202124; max-width: 560px; margin: 48px auto; padding: 0 20px; }
    h1 { font-size: 20px; font-weight: 500; }
    .card { padding: 12px 14px; background: #f1f3f4; border-radius: 8px; margin: 16px 0; }
    label { display: block; margin: 12px 0 4px; color: #5f6368; font-size: 13px; }
    select { padding: 6px 8px; border: 1px solid #dadce0; border-radius: 6px; font: inherit; }
    button { border-radius: 6px; padding: 9px 18px; font: 500 14px Roboto, Arial, sans-serif; cursor: pointer; margin-right: 8px; border: 1px solid #dadce0; background: #fff; color: #3c4043; margin-top: 16px; }
    button.primary { background: #1a73e8; border-color: #1a73e8; color: #fff; }
    #status { margin-top: 16px; font-weight: 500; }
  </style>
</head>
<body>
  <h1>Schedule a follow-up?</h1>
  <div class="card" id="info">Loading…</div>
  <div id="controls" hidden>
    <label for="dur">Follow-up length</label>
    <select id="dur">
      <option value="15">15 minutes</option>
      <option value="30" selected>30 minutes</option>
      <option value="45">45 minutes</option>
      <option value="60">60 minutes</option>
    </select>
    <div>
      <button class="primary" id="accept">Schedule in next free slot</button>
      <button id="dismiss">Dismiss</button>
    </div>
  </div>
  <div id="status"></div>
  <script src="followup.js"></script>
</body>
</html>
