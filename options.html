<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GCal Precision Mover — Options</title>
  <style>
    body {
      font: 14px/1.55 Roboto, Arial, sans-serif;
      color: #202124;
      max-width: 620px;
      margin: 40px auto;
      padding: 0 20px;
    }
    h1 { font-size: 20px; font-weight: 500; }
    code {
      background: #f1f3f4;
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 13px;
      word-break: break-all;
    }
    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px 10px;
      border: 1px solid #dadce0;
      border-radius: 6px;
      font: inherit;
      margin: 6px 0 12px;
    }
    button {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 8px 16px;
      font: 500 14px Roboto, Arial, sans-serif;
      cursor: pointer;
      margin-right: 8px;
    }
    button.secondary { background: #fff; color: #1a73e8; border: 1px solid #dadce0; }
    #status { margin-top: 14px; font-weight: 500; }
    .redirect { margin: 14px 0; padding: 10px 12px; background: #e8f0fe; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>GCal Precision Mover</h1>

  <p>
    Paste the <strong>OAuth 2.0 Client ID</strong> from your Google Cloud project
    (setup steps are in the README that shipped with this extension).
  </p>

  <div class="redirect">
    Your OAuth redirect URI (add this to the Google Cloud OAuth client):<br>
    <code id="redirect-uri"></code>
  </div>

  <label for="client-id">Client ID</label>
  <input type="text" id="client-id" placeholder="xxxxxxxx.apps.googleusercontent.com">

  <button id="save">Save</button>
  <button id="test" class="secondary">Save &amp; test sign-in</button>

  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
